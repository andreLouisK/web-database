name: Azure Static Web Apps and Functions CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  # --- JOBB 1: BYGG OG DEPLOY FRONTEND TIL STATIC WEB APP ---
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_HILL_0C6970E03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/" 
          api_location: "" # VIKTIG: Vi tømmer denne for å bruke dedikert Function App i stedet
          output_location: "dist"

  # --- JOBB 2: BYGG OG DEPLOY API TIL DEDIKERT FUNCTION APP ---
  deploy_backend_job:
    # Denne kjører kun ved push til main, ikke for PR-validering (valgfritt)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy Backend Functions
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 'Install API dependencies'
        shell: bash
        run: |
          pushd ./api
          npm install
          popd

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: 'Web-database-Functions'
          package: './api'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  # --- JOBB 3: RYDD OPP VED LUKKING AV PULL REQUEST ---
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_HILL_0C6970E03 }}
          action: "close"